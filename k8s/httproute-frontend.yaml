apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: spend-control-frontend
  namespace: spend-control
spec:
  parentRefs:
    - name: spend-control-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: spend-control-frontend
          port: 3000
