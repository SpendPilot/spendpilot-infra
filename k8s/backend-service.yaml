apiVersion: v1
kind: Service
metadata:
  name: spend-control-identity
  namespace: spend-control
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: spend-control-identity
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: spend-control-finance
  namespace: spend-control
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: spend-control-finance
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: spend-control-documents
  namespace: spend-control
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: spend-control-documents
  ports:
    - name: http
      port: 8000
      targetPort: 8000
