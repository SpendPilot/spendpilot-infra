apiVersion: apps/v1
kind: Deployment
metadata:
  name: spend-control-frontend
  namespace: spend-control
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: spend-control-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spend-control-frontend
    spec:
      serviceAccountName: spend-control-workload
      containers:
        - name: frontend
          image: spendcontrol/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: spend-control-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
          livenessProbe:
            httpGet:
              path: /
              port: 3000
