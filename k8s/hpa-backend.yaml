apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spend-control-identity
  namespace: spend-control
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spend-control-identity
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
