apiVersion: batch/v1
kind: Job
metadata:
  name: spend-control-migrate
  namespace: spend-control
spec:
  template:
    metadata:
      labels:
        azure.workload.identity/use: "true"
    spec:
      restartPolicy: OnFailure
      serviceAccountName: spend-control-workload
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: spend-control-secrets-provider
      containers:
        - name: migrate
          image: spendcontrol/backend:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "alembic upgrade head"]
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          env:
            - name: SERVICE_NAME
              value: migration-job
          envFrom:
            - configMapRef:
                name: spend-control-config
            - secretRef:
                name: spend-control-secrets
