apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: spend-control-identity
  namespace: spend-control
spec:
  parentRefs:
    - name: spend-control-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: spend-control-identity
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /api/admin
      backendRefs:
        - name: spend-control-identity
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /health
      backendRefs:
        - name: spend-control-identity
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /ready
      backendRefs:
        - name: spend-control-identity
          port: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: spend-control-finance
  namespace: spend-control
spec:
  parentRefs:
    - name: spend-control-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/finance
      backendRefs:
        - name: spend-control-finance
          port: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: spend-control-documents
  namespace: spend-control
spec:
  parentRefs:
    - name: spend-control-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/documents
      backendRefs:
        - name: spend-control-documents
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /api/ai
      backendRefs:
        - name: spend-control-documents
          port: 8000
