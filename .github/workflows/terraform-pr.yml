name: Terraform PR

on:
  pull_request:
    branches:
      - main
    paths:
      - "envs/**"
      - "modules/**"
      - "scripts/**"
      - ".github/workflows/terraform-*.yml"
      - ".tflint.hcl"

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_AZUREAD: true
  ARM_USE_OIDC: true
  INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
  TF_IN_AUTOMATION: true
  TF_INPUT: false

jobs:
  detect-envs:
    runs-on: ubuntu-latest
    outputs:
      envs: ${{ steps.detect.outputs.envs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        shell: bash
        run: |
          chmod +x scripts/*.sh
          envs_json="$(scripts/terraform-env-detect.sh \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}")"
          echo "envs=$envs_json" >> "$GITHUB_OUTPUT"

  terraform-fmt:
    needs: detect-envs
    if: needs.detect-envs.outputs.envs != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Check formatting for changed roots
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t envs < <(jq -r '.[]' <<< '${{ needs.detect-envs.outputs.envs }}')

          for environment in "${envs[@]}"; do
            terraform fmt -check -recursive "envs/$environment"
          done

  tflint:
    needs: detect-envs
    if: needs.detect-envs.outputs.envs != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint for changed roots
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t envs < <(jq -r '.[]' <<< '${{ needs.detect-envs.outputs.envs }}')

          for environment in "${envs[@]}"; do
            tflint --minimum-failure-severity=error --chdir="envs/$environment"
          done

  security-scan:
    needs: detect-envs
    if: needs.detect-envs.outputs.envs != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/setup-trivy@v0.2.6

      - name: Run Trivy IaC scan for changed roots
        id: trivy-scan
        continue-on-error: true
        shell: bash
        env:
          TF_VAR_postgres_admin_password: trivy-static-placeholder
        run: |
          set -uo pipefail
          mapfile -t envs < <(jq -r '.[]' <<< '${{ needs.detect-envs.outputs.envs }}')
          status=0

          mkdir -p trivy-results

          for environment in "${envs[@]}"; do
            trivy config \
              --skip-version-check \
              --severity HIGH,CRITICAL \
              --exit-code 1 \
              --format sarif \
              --output "trivy-results/trivy-$environment.sarif" \
              "envs/$environment" || status=$?
          done

          exit "$status"

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-${{ github.event.pull_request.head.sha }}-${{ github.run_id }}
          path: trivy-results/*.sarif
          retention-days: 5

  checks-summary:
    needs:
      - detect-envs
      - terraform-fmt
      - tflint
      - security-scan
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Comment workflow summary on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-checks
          message: |
            ### Terraform PR checks

            - Changed roots: `${{ needs.detect-envs.outputs.envs }}`
            - `terraform fmt`: `${{ needs.terraform-fmt.result }}`
            - `tflint`: `${{ needs.tflint.result }}`
            - `trivy`: `${{ needs.security-scan.result }}`

  plan:
    needs:
      - detect-envs
      - terraform-fmt
      - tflint
      - security-scan
    if: needs.detect-envs.outputs.envs != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate shared Azure auth variables
        shell: bash
        run: |
          set -euo pipefail
          missing=0

          for name in ARM_CLIENT_ID ARM_TENANT_ID ARM_SUBSCRIPTION_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required workflow variable: $name" >&2
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Set AZURE_CLIENT_ID, AZURE_TENANT_ID, and AZURE_SUBSCRIPTION_ID as repository or organization variables." >&2
            echo "PR jobs do not bind to GitHub Environments, so environment-scoped vars are not available here." >&2
            exit 1
          fi

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Plan changed roots
        shell: bash
        env:
          DEV_POSTGRES_PASSWORD_FALLBACK: ${{ secrets.TF_VAR_POSTGRES_ADMIN_PASSWORD_DEV }}
          PROD_POSTGRES_PASSWORD_FALLBACK: ${{ secrets.TF_VAR_POSTGRES_ADMIN_PASSWORD_PROD }}
          DEV_TERRAFORM_SECRETS_KEYVAULT_NAME: ${{ vars.DEV_TERRAFORM_SECRETS_KEYVAULT_NAME }}
          DEV_POSTGRES_ADMIN_PASSWORD_SECRET_NAME: ${{ vars.DEV_POSTGRES_ADMIN_PASSWORD_SECRET_NAME }}
          PROD_TERRAFORM_SECRETS_KEYVAULT_NAME: ${{ vars.PROD_TERRAFORM_SECRETS_KEYVAULT_NAME }}
          PROD_POSTGRES_ADMIN_PASSWORD_SECRET_NAME: ${{ vars.PROD_POSTGRES_ADMIN_PASSWORD_SECRET_NAME }}
        run: |
          set -euo pipefail
          mapfile -t envs < <(jq -r '.[]' <<< '${{ needs.detect-envs.outputs.envs }}')
          chmod +x scripts/*.sh
          : > terraform-plan-comment.md

          for environment in "${envs[@]}"; do
            vault_name=""
            secret_name=""
            fallback_value=""

            case "$environment" in
              dev)
                vault_name="$DEV_TERRAFORM_SECRETS_KEYVAULT_NAME"
                secret_name="$DEV_POSTGRES_ADMIN_PASSWORD_SECRET_NAME"
                fallback_value="$DEV_POSTGRES_PASSWORD_FALLBACK"
                ;;
              prod)
                vault_name="$PROD_TERRAFORM_SECRETS_KEYVAULT_NAME"
                secret_name="$PROD_POSTGRES_ADMIN_PASSWORD_SECRET_NAME"
                fallback_value="$PROD_POSTGRES_PASSWORD_FALLBACK"
                ;;
            esac

            secret_value=""
            if [[ -n "$vault_name" && -n "$secret_name" ]]; then
              secret_value="$(az keyvault secret show --vault-name "$vault_name" --name "$secret_name" --query value -o tsv)"
            fi

            if [[ -z "$secret_value" ]]; then
              secret_value="$fallback_value"
            fi

            if [[ -n "$secret_value" ]]; then
              echo "::add-mask::$secret_value"
            fi

            scripts/terraform-prime-kubeconfig.sh "$environment"

            tf_env_args=()
            if [[ -n "$secret_value" ]]; then
              tf_env_args=("TF_VAR_postgres_admin_password=$secret_value")
            fi

            env "${tf_env_args[@]}" terraform -chdir="envs/$environment" init -input=false
            env "${tf_env_args[@]}" terraform -chdir="envs/$environment" validate
            env "${tf_env_args[@]}" terraform -chdir="envs/$environment" plan -input=false -out="tfplan-$environment"
            terraform -chdir="envs/$environment" show -no-color "tfplan-$environment" > "envs/$environment/tfplan-$environment.txt"
            terraform -chdir="envs/$environment" show -json "tfplan-$environment" > "envs/$environment/plan.json"
            scripts/terraform-plan-summary.sh "$environment" "envs/$environment/plan.json" > "envs/$environment/plan-summary.md"

            {
              echo "## \`$environment\`"
              echo
              cat "envs/$environment/plan-summary.md"
              echo
            } >> terraform-plan-comment.md
          done

      - name: Comment plan summary on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-plan
          path: terraform-plan-comment.md

      - name: Upload review plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-tfplan-text-${{ github.event.pull_request.head.sha }}-${{ github.run_id }}
          path: |
            envs/*/tfplan-*.txt
            envs/*/plan-summary.md
          retention-days: 5

      - name: Setup Infracost
        if: ${{ env.INFRACOST_API_KEY != '' }}
        uses: infracost/actions/setup@v3

      - name: Generate Infracost comment
        if: ${{ env.INFRACOST_API_KEY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t envs < <(jq -r '.[]' <<< '${{ needs.detect-envs.outputs.envs }}')
          : > infracost-comment.md

          for environment in "${envs[@]}"; do
            infracost breakdown \
              --path="envs/$environment/plan.json" \
              --format=table \
              --out-file="envs/$environment/infracost.md"

            {
              echo "## \`$environment\`"
              echo
              cat "envs/$environment/infracost.md"
              echo
            } >> infracost-comment.md
          done

      - name: Comment Infracost on PR
        if: ${{ env.INFRACOST_API_KEY != '' }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: infracost
          path: infracost-comment.md
